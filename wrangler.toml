name = "blog" # Pages 프로젝트 이름과 일치시키지 않아도 무방
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# Cloudflare Pages 배포 시:
# 1. `wrangler d1 create blog` 실행
# 2. 출력된 database_id를 아래 database_id와 preview_database_id에 채워넣는다.
# 3. Pages 대시보드 Settings → Functions → D1 database bindings에서 `DB`를 같은 DB에 연결.
[[d1_databases]]
binding = "DB"
database_name = "blog"
database_id = "bc42db72-4835-48b0-8cba-6b08ed58f39a"
preview_database_id = "bc42db72-4835-48b0-8cba-6b08ed58f39a"
migrations_dir = "./drizzle"

# Run `wrangler r2 bucket create blog-uploads` before deploying.
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "blog-uploads"
preview_bucket_name = "blog-uploads"

# 평문 환경변수. 비밀이 아닌 값만 여기에 둔다.
# 비밀(JWT_SECRET, IP_HASH_SALT, ADMIN_PASSWORD_HASH, TURNSTILE_SECRET)은
# Cloudflare 대시보드 Settings → Variables and Secrets → Secret으로 추가한다.
[vars]
PUBLIC_SITE_URL = "https://open-blog.pages.dev/"
OWNER_EMAIL = "popeye0618@gmail.com"
OWNER_NAME = "popeye0618"
AUTH_MODE = "password"
PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAADJsQjEVCQzN9woz"
